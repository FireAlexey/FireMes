name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: |
          chmod +x ./node_modules/.bin/expo
          ./node_modules/.bin/expo export --platform web

      - name: Fix asset paths for GitHub Pages subdirectory
        run: |
          sed -i 's|/_expo/|/FireMes/_expo/|g' dist/index.html
          sed -i 's|/assets/|/FireMes/assets/|g' dist/index.html

      - name: Copy 404.html
        run: cp 404.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4