<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>FireMes</title>
    <script>
      // Expo Router + GitHub Pages SPA fix
      // Сохраняем путь в sessionStorage и редиректим на index.html
      var path = window.location.pathname;
      var repo = '/FireMes';
      // Убираем базовый путь репо
      var route = path.replace(repo, '') || '/';
      sessionStorage.setItem('spa_redirect', route + window.location.search + window.location.hash);
      window.location.replace(repo + '/');
    </script>
  </head>
  <body></body>
</html>
